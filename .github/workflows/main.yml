name: test orlov pw6
# когда запускаем
on: 
  push:
    branches: 
        - main
# ручной запуск
  workflow_dispatch: 

jobs:
  testjobs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
      - name: Setup Node.js environment
        uses: actions/setup-node@v6.4.0
      - name: Устанавливаем пакеты из package.json
        run: npm ci
      - name: Устанавливаекм браузеры
        run: npx playwright install --with-debs
      - name: Запускаем тест
        run: npm t
